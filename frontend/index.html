<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>L1 Scientific Justification Engine</title>

  <style>
    body {
      font-family: monospace;
      margin: 40px;
      background: #fafafa;
    }

    h2 {
      margin-bottom: 6px;
    }

    p {
      font-size: 14px;
      color: #444;
    }

    input[type="file"] {
      margin-top: 10px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      background: #f4f4f4;
      border: 1px solid #ccc;
      resize: vertical;
      font-family: monospace;
      font-size: 13px;
    }

    button {
      margin-top: 16px;
      padding: 8px 18px;
      font-size: 14px;
      cursor: pointer;
    }

    hr {
      margin-top: 30px;
      margin-bottom: 30px;
    }

    /* ===== Chat-like system output ===== */

    .chat {
      background: #000;
      color: #00ff66;
      padding: 18px;
      border-left: 4px solid #00ff66;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
      min-height: 120px;
    }

    .hint {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<h2>L1 Scientific Justification Engine</h2>
<p>
<strong>Pipeline:</strong>
L0 Data → LLM Observation → L1 Coordinate → SJ Proposal
</p>

<hr />

<div>
  <input type="file" id="fileInput" />
  <p class="hint">Upload raw numeric experimental data (TXT / CSV)</p>

  <textarea id="rawData" readonly
    placeholder="Uploaded raw data preview will appear here"></textarea>
</div>

<button onclick="runEngine()">Run Engine</button>

<hr />

<!-- ===== Chat-like Output ===== -->
<div id="chatLog" class="chat">
(waiting)
</div>

<script>
const API_URL = "http://localhost:8000/v14/run";
const fileInput = document.getElementById("fileInput");
const rawArea = document.getElementById("rawData");
const chatLog = document.getElementById("chatLog");

/* File load */
fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    rawArea.value = e.target.result;
  };
  reader.readAsText(file);
});

/* Run engine */
function runEngine() {
  chatLog.innerText = "Running analysis...\n";

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ raw_data: rawArea.value })
  })
  .then(async res => {
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch {
      throw new Error(text);
    }
  })
  .then(d => {
    let output = "";

    output += "SYSTEM:\n";
    output += "Numeric data has been observed.\n\n";

    output += "L1 coordinate state:\n";
    output += JSON.stringify(d.l1_state || {}, null, 2) + "\n\n";

    output += "Observation assumptions (proposed):\n";
    if ((d.assumptions || []).length === 0) {
      output += "- None required for this observation.\n\n";
    } else {
      d.assumptions.forEach(a => {
        output += `- ${a.statement} [${a.assumption_id}]\n`;
      });
      output += "\n";
    }

    output += "Scientific justification candidates:\n";
    if ((d.sj_proposals || []).length === 0) {
      output += "- No sufficient ontology match found.\n";
      output += "  Judgment is intentionally withheld.\n";
    } else {
      d.sj_proposals.forEach((sj, i) => {
        output += `${i + 1}. ${sj.mechanism_id} `;
        output += `(match score: ${sj.score})\n`;
      });
    }

    output += "\nSYSTEM:\n";
    output += "This stage presents observations and explanation candidates only.\n";
    output += "No scoring or decision has been performed.";

    chatLog.innerText = d.system_narrative || "(no output)";
  })
  .catch(err => {
    chatLog.innerText =
      "SYSTEM:\nAnalysis failed.\n\n" + err.message;
  });
}

</script>

</body>
</html>
