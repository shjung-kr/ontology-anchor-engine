<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ontology Anchor Engine | Modernized</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f8f9fa;
      --panel: #ffffff;
      --border: #e2e8f0;
      --accent: #1f6b52;
      --text: #1a1c1a;
      --muted: #64748b;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    /* 사이드바 */
    aside {
      width: 240px;
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    /* 메인 컨텐츠 영역 */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      justify-content: space-between;
    }

    /* 레이아웃 변경: 왼쪽 1열 구조, 오른쪽 넓은 작업창 */
    .workspace-grid {
      display: grid;
      grid-template-columns: 450px 1fr; /* 왼쪽 고정, 오른쪽 확장 */
      gap: 1rem;
      padding: 1rem;
      height: calc(100vh - 64px);
      box-sizing: border-box;
    }

    .left-column {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow: hidden;
    }

    .card {
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card-header {
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .scroll-area { flex: 1; overflow-y: auto; padding: 1rem; }

    /* 버튼 및 입력창 */
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
    .btn-primary { background: var(--accent); color: white; }
    
    input[type="text"] {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* 채팅 메시지 스타일 */
    .chat-msg { margin-bottom: 1rem; padding: 0.8rem; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; }
    .msg-bot { background: #f1f5f9; align-self: flex-start; margin-right: 15%; }
    .msg-user { background: #dff0e8; color: var(--accent); align-self: flex-end; margin-left: 15%; }

    .monospace { font-family: "IBM Plex Mono", monospace; font-size: 0.8rem; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <aside>
    <div style="font-weight: 700; font-size: 1.2rem; color: var(--accent); margin-bottom: 2rem;">Ontology Anchor</div>
    <nav style="flex: 1;">
      <div style="padding: 0.75rem; background: #ecfdf5; color: var(--accent); border-radius: 8px; font-weight: 600;">Workspace</div>
      <div style="padding: 0.75rem; color: var(--muted);">Analysis History</div>
    </nav>
  </aside>

  <main>
    <header>
      <div style="display: flex; gap: 1rem; align-items: center;">
        <h2 style="font-size: 1rem; margin: 0;">Reasoning Workspace</h2>
        <select id="prioritySelect" class="monospace">
          <option value="balanced">Balanced Priority</option>
          <option value="conservative">Conservative</option>
          <option value="speculative">Speculative</option>
        </select>
      </div>
      <button id="runBtn" class="btn btn-primary">▶ Run Analysis</button>
    </header>

    <div class="workspace-grid">
      <div class="left-column">
        
        <section class="card" style="flex: 1.2;">
          <div class="card-header">
            <span>Interpretation Paths</span>
            <span id="validationCount" class="monospace" style="font-size: 0.7rem;">IDLE</span>
          </div>
          <div class="scroll-area">
            <div id="dropZone" style="border: 2px dashed var(--border); padding: 1.5rem; text-align: center; border-radius: 10px; margin-bottom: 1rem;">
              <input type="file" id="fileInput" hidden />
              <button onclick="document.getElementById('fileInput').click()" style="background:#fff; border:1px solid var(--border); padding: 5px 10px; cursor:pointer; border-radius:5px;">파일 업로드</button>
              <div id="fileNameDisplay" style="margin-top: 10px; font-size: 0.8rem; font-weight: 600; color: var(--accent);"></div>
            </div>
            <div id="resultDisplay"></div>
          </div>
        </section>

        <section class="card" style="flex: 1;">
          <div class="card-header">Conversational Reasoning</div>
          <div id="chatHistory" class="scroll-area" style="display: flex; flex-direction: column;"></div>
          
          <div id="questionBox" style="padding: 0.8rem; background: #fffcf0; border-top: 1px solid var(--border); font-size: 0.85rem;" class="hidden"></div>
          
          <div style="padding: 0.8rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem;">
            <input type="text" id="chatInput" placeholder="추론 보정 및 의견 입력...">
            <button id="chatSendBtn" class="btn btn-primary" style="padding: 0.5rem 1rem;">Send</button>
          </div>
        </section>
      </div>

      <section class="card">
        <div class="card-header">Detailed Analysis & Visualization</div>
        <div class="scroll-area">
          <p style="color: var(--muted); text-align: center; margin-top: 5rem;">분석을 실행하면 상세 데이터가 이곳에 표시됩니다.</p>
          </div>
      </section>
    </div>
  </main>

  <script>
    /* 이 부분에 기존 index.html의 <script> 태그 안에 있던 
       모든 함수(runAnalysis, postChatPayload, applyConversationState, updateUIFromState 등)를 
       그대로 복사하여 붙여넣으시면 됩니다. 
    */

    let currentRunId = null;
    let uploadedFileData = null;

    const runBtn = document.getElementById('runBtn');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    const chatHistory = document.getElementById('chatHistory');
    const resultDisplay = document.getElementById('resultDisplay');
    const fileInput = document.getElementById('fileInput');
    const prioritySelect = document.getElementById('prioritySelect');
    const questionBox = document.getElementById('questionBox');
    const fileNameDisplay = document.getElementById('fileNameDisplay');

    // 파일 로드 이벤트
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        fileNameDisplay.innerText = `Selected: ${file.name}`;
        const reader = new FileReader();
        reader.onload = (ev) => { uploadedFileData = ev.target.result; };
        reader.readAsText(file);
      }
    };

    // 분석 실행
    runBtn.onclick = async () => {
      if (!uploadedFileData) return alert("데이터를 먼저 업로드해 주세요.");
      runBtn.innerText = "Processing...";
      
      try {
        const response = await fetch('http://127.0.0.1:8000/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            raw_data: uploadedFileData,
            intent: { analysis_priority: prioritySelect.value }
          })
        });

        if (!response.ok) throw new Error(`${response.status} Error`);

        const data = await response.json();
        currentRunId = data.run_id;
        updateUIFromState(data);
      } catch (err) {
        alert("분석 실패: 서버 주소와 상태를 확인하세요. (401 에러 주의)");
      } finally {
        runBtn.innerText = "▶ Run Analysis";
      }
    };

    // 채팅 전송
    chatSendBtn.onclick = async () => {
      const text = chatInput.value.trim();
      if (!text || !currentRunId) return;

      appendMessage(text, 'user');
      chatInput.value = "";

      try {
        const response = await fetch('http://127.0.0.1:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            run_id: currentRunId,
            user_text: text,
            intent_update: { analysis_priority: prioritySelect.value }
          })
        });
        const data = await response.json();
        if (data.message) appendMessage(data.message, 'bot');
      } catch (err) {
        console.error(err);
      }
    };

    function appendMessage(text, role) {
      const d = document.createElement('div');
      d.className = `chat-msg msg-${role}`;
      d.innerText = text;
      chatHistory.appendChild(d);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function updateUIFromState(data) {
      resultDisplay.innerHTML = `<div class="monospace" style="padding:10px; background:#f0f7f4; border:1px solid var(--accent); border-radius:5px;">Analysis Run ID: ${data.run_id}</div>`;
      if (data.message) appendMessage(data.message, 'bot');
    }
  </script>
</body>
</html>
